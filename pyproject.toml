[project]
name = "AStockScreener"
version = "1.0.0"
description = "智能 A 股 AI 量化交易员"
requires-python = ">=3.11"

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py311"

[tool.ruff.lint]
select = ["F", "E", "W", "UP", "B", "SIM"]
ignore = ["E501", "E402", "SIM102", "SIM105", "SIM108", "SIM117"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pyright]
reportMissingTypeStubs = false
