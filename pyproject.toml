[project]
name = "AStockScreener"
version = "1.0.0"
description = "智能 A 股 AI 量化交易员"
requires-python = ">=3.11"

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py311"

[tool.ruff.lint]
select = ["F", "E", "W", "UP", "B", "SIM", "BLE"]
ignore = ["E501", "E402", "SIM102", "SIM105", "SIM108", "SIM117", "BLE001"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pyright]
reportMissingTypeStubs = false

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "e2e: End-to-end tests",
]

[tool.coverage.run]
source = ["core", "data", "services", "strategies", "utils"]
omit = [
    "data/tiktoken_cache/*",
    "data/domain_services/offline_calendar.py",
    "scripts/*",
]

[tool.coverage.report]
fail_under = 85
per_file_minimum = 80
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "pass",
]
