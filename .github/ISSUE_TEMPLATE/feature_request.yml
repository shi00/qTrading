name: ✨ 功能请求
description: 提出一个新功能或改进建议
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 AStockScreener 提出建议！请先搜索 [已有 issue](https://github.com/shi00/qTrading/issues?q=is%3Aissue+label%3Afeature) 避免重复。
        新增功能需符合 [CLAUDE.md §1.3 极简设计](https://github.com/shi00/qTrading/blob/main/CLAUDE.md#13-极简设计-simplicity-first)（YAGNI 优先）与 [§3.1 红线](https://github.com/shi00/qTrading/blob/main/CLAUDE.md#31--绝对禁止)。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 你正在尝试解决什么问题？现状有什么不便？
      placeholder: 我在选股时经常想...，但目前无法做到...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望项目如何解决这个问题？请尽量具体。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案或 workaround？

  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 任何有助于理解这个请求的额外信息（截图、参考链接、相关 issue 等）。

  - type: dropdown
    id: layer
    attributes:
      label: 影响层
      description: 该功能主要影响哪个架构层？（参考 [CLAUDE.md §4.1 分层架构](https://github.com/shi00/qTrading/blob/main/CLAUDE.md#41-分层架构)）
      options:
        - core (架构核心)
        - app (引导层)
        - data (数据层)
        - services (应用服务)
        - strategies (策略层)
        - ui (表现层)
        - utils (横切关注点)
        - ci (CI/CD / 构建)
        - docs (文档)
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级建议
      description: |
        你认为该功能的优先级如何？
        - High：核心场景缺失，严重影响使用
        - Medium：改善体验，有 workaround
        - Low：锦上添花，非必须
      options:
        - High (核心场景缺失，严重影响使用)
        - Medium (改善体验，有 workaround)
        - Low (锦上添花，非必须)
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 自检清单
      description: 提交前请确认
      options:
        - label: 我已搜索过现有 issue，确认这不是重复请求
          required: true
        - label: 我已确认该功能符合 CLAUDE.md §1.3 极简设计原则（YAGNI）
          required: true
        - label: 我已阅读 CLAUDE.md §4 架构边界，确认该功能不违反分层依赖
          required: false
