name: qtrading-pg-sidecar CI

on:
  push:
    branches: ["main"]
    paths:
      - 'sidecars/qtrading-pg-sidecar/**'
      - '.github/workflows/sidecar.yml'
    tags: ['sidecar-v*']
  pull_request:
    paths:
      - 'sidecars/qtrading-pg-sidecar/**'
      - '.github/workflows/sidecar.yml'
  workflow_dispatch:
  schedule:
    # 每天凌晨 2:00 UTC（北京时间 10:00）flaky 检测
    - cron: '0 2 * * *'

permissions:
  contents: read

concurrency:
  group: ci-sidecar-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # postgresql_embedded/postgresql_archive build script 通过 GitHub API 下载
  # PostgreSQL binaries 清单，未认证请求 60 次/小时/IP，多平台并行易触发 403。
  # 传入 GITHUB_TOKEN 提升至 5000 次/小时。
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint-test:
    name: Lint & Test (${{ matrix.os }}/${{ matrix.target }})
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # pg_plan §15.3 多平台构建矩阵（4 平台，移除 macos-13 Intel runner，已退役）
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux-arm
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos
            runner: macos-14
            target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: sidecars/qtrading-pg-sidecar

    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust toolchain (1.97.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: sidecars/qtrading-pg-sidecar
          key: ${{ matrix.target }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (-D warnings)
        run: cargo clippy --target ${{ matrix.target }} --all-targets -- -D warnings

      - name: cargo test (bin, unit tests)
        run: cargo test --target ${{ matrix.target }} --bins

      - name: cargo test (roundtrip integration, serial)
        run: cargo test --target ${{ matrix.target }} --test roundtrip -- --test-threads=1

      - name: cargo test (failure_injection integration, serial)
        run: cargo test --target ${{ matrix.target }} --test failure_injection -- --test-threads=1

      - name: Install cargo-llvm-cov (Linux only)
        if: matrix.os == 'linux'
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7  # v2.85.0
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov (unit tests coverage, Linux only, advisory mode)
        # NOTE(lazy): §17.0 要求 Rust unit 行覆盖率 ≥85%，但 Phase 1 合并时未设门禁.
        # 实测 2026-07-23: TOTAL 61.15% (run.rs 10%/maint.rs 45%/pgbin.rs 45% 测试不足).
        # ceiling: 85%（§17.0 强制门禁，D38）. upgrade: 补充 maint.rs/pgbin.rs/run.rs 单测至 85% 后恢复 --fail-under-lines 85（独立 PR 推进）.
        # D38 决策: P0-5 拆为独立 PR，不阻塞 pg-plan-review 主 PR.
        if: matrix.os == 'linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo llvm-cov --target ${{ matrix.target }} --bins --lcov --output-path lcov.info

      - name: Upload coverage report (Linux only)
        if: matrix.os == 'linux' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rust-coverage-lcov
          path: lcov.info
          retention-days: 14

  build-artifacts:
    name: Build release artifact (${{ matrix.os }}/${{ matrix.target }})
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        include:
          # binary_path 相对于 defaults.run.working-directory（sidecars/qtrading-pg-sidecar）
          # upload-artifact path 相对于 GITHUB_WORKSPACE，需补 working-directory 前缀
          # pg_plan §15.3 多平台构建矩阵（4 平台，移除 macos-13 Intel runner，已退役）
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: qtrading-pg-sidecar-windows-x86_64.exe
            binary_path: target/x86_64-pc-windows-msvc/release/qtrading-pg-sidecar.exe
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: qtrading-pg-sidecar-linux-x86_64
            binary_path: target/x86_64-unknown-linux-gnu/release/qtrading-pg-sidecar
          - os: linux-arm
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: qtrading-pg-sidecar-linux-aarch64
            binary_path: target/aarch64-unknown-linux-gnu/release/qtrading-pg-sidecar
          - os: macos
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: qtrading-pg-sidecar-macos-aarch64
            binary_path: target/aarch64-apple-darwin/release/qtrading-pg-sidecar
    defaults:
      run:
        working-directory: sidecars/qtrading-pg-sidecar

    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust toolchain (1.97.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: sidecars/qtrading-pg-sidecar
          key: release-${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --target ${{ matrix.target }} --release

      - name: Setup Python (for generate_sidecar_manifest.py)
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.13'

      - name: Generate sidecar manifest
        # Windows 默认 PowerShell 不识别 `\` 续行符，显式指定 bash 保证 4 平台一致
        shell: bash
        run: |
          python ../../scripts/generate_sidecar_manifest.py \
            --sidecar ${{ matrix.binary_path }} \
            --target ${{ matrix.target }} \
            --output sidecar-manifest-${{ matrix.os }}.json

      - name: Upload release artifact (含 manifest)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          # upload-artifact path 相对于 GITHUB_WORKSPACE，需补 working-directory 前缀
          path: |
            sidecars/qtrading-pg-sidecar/${{ matrix.binary_path }}
            sidecars/qtrading-pg-sidecar/sidecar-manifest-${{ matrix.os }}.json
          if-no-files-found: error
          retention-days: 14

  audit:
    name: Security audit (cargo audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sidecars/qtrading-pg-sidecar

    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust toolchain (1.97.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7  # v2.85.0
        with:
          tool: cargo-audit

      - name: cargo audit
        # 检查 Cargo.lock 中的已知漏洞（RustSec Advisory Database）
        # 与平台无关，仅在 Linux 上跑即可
        run: cargo audit --deny warnings

  release:
    name: Release sidecar binary & manifest (${{ matrix.os }}/${{ matrix.target }})
    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/sidecar-v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: write  # gh release upload 需要
    strategy:
      fail-fast: false
      matrix:
        include:
          # 对齐 build-artifacts job 的 4 平台 target 矩阵 (pg_plan §15.3 多平台构建矩阵，移除 macos-13 Intel runner)
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/qtrading-pg-sidecar.exe
            artifact_name: qtrading-pg-sidecar-windows-x86_64.exe
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/qtrading-pg-sidecar
            artifact_name: qtrading-pg-sidecar-linux-x86_64
          - os: linux-arm
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_path: target/aarch64-unknown-linux-gnu/release/qtrading-pg-sidecar
            artifact_name: qtrading-pg-sidecar-linux-aarch64
          - os: macos
            runner: macos-14
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/qtrading-pg-sidecar
            artifact_name: qtrading-pg-sidecar-macos-aarch64
    defaults:
      run:
        working-directory: sidecars/qtrading-pg-sidecar

    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Rust toolchain (1.97.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: sidecars/qtrading-pg-sidecar
          key: release-${{ matrix.target }}

      - name: Setup Python (for generate_sidecar_manifest.py)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'

      - name: cargo build --release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo build --target ${{ matrix.target }} --release

      - name: Generate sidecar manifest
        # Windows 默认 PowerShell 不识别 `\` 续行符，显式指定 bash 保证 4 平台一致
        shell: bash
        run: |
          python ../../scripts/generate_sidecar_manifest.py \
            --sidecar ${{ matrix.binary_path }} \
            --target ${{ matrix.target }} \
            --output sidecar-manifest-${{ matrix.os }}.json

      - name: Generate SHA256 checksums
        # 每平台生成独立 sha256sums-<target>.txt，避免并发写冲突
        # 上传前 cp binary 为 artifact_name（每平台唯一），避免 4 个非 Windows 平台 basename
        # 相同（qtrading-pg-sidecar）被 --clobber 互相覆盖（P1: release asset 名冲突）
        shell: bash
        run: |
          BINARY_PATH="${{ matrix.binary_path }}"
          ARTIFACT_NAME="${{ matrix.artifact_name }}"
          cp "$BINARY_PATH" "$ARTIFACT_NAME"
          HASH=$(sha256sum "$ARTIFACT_NAME" | awk '{print $1}')
          echo "$HASH  $ARTIFACT_NAME" > "sha256sums-${{ matrix.target }}.txt"
          echo "SHA256: $HASH  $ARTIFACT_NAME"
          cat "sha256sums-${{ matrix.target }}.txt"

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $TAG"
          # gh release create 幂等：release 已存在时静默失败
          gh release create "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          # 上传 artifact_name（每平台唯一）+ manifest + sha256sums（--clobber 覆盖已存在的 assets）
          gh release upload "$TAG" \
            "${{ matrix.artifact_name }}" \
            "sidecar-manifest-${{ matrix.os }}.json" \
            "sha256sums-${{ matrix.target }}.txt" \
            --clobber
          echo "Release $TAG assets uploaded successfully"
