name: AStockScreener CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'requirements*.in'
      - 'pyproject.toml'
      - 'pyrightconfig.json'
      - 'alembic.ini'
      - 'AStockScreener.spec'
      - 'installer.iss'
      - 'locales/**'
      - '.github/workflows/ci_cd.yml'
  workflow_dispatch:

env:
  CI_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD || 'ci_astock_default_pwd' }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-checks:
    name: Code Quality & Tests (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          POSTGRES_DB: test_astock
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node for Pyright
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          set -o pipefail
          pip install -r requirements-optional.txt 2>&1 | tee optional-deps.log || echo "OPTIONAL_DEPS_FAILED=true" >> $GITHUB_ENV
          pip install -r requirements-dev.txt

      - name: Verify requirements.txt is up to date
        run: |
          pip install pip-tools
          pip-compile pyproject.toml -o requirements_check.txt
          diff requirements.txt requirements_check.txt || (echo "::error::requirements.txt is out of date. Run: pip-compile pyproject.toml -o requirements.txt" && exit 1)

      - name: Report optional deps status
        if: env.OPTIONAL_DEPS_FAILED == 'true'
        run: |
          echo "::warning::Optional dependencies failed to install. Some tests may be skipped."
          cat optional-deps.log

      - name: Install Node dependencies
        run: npm ci

      - name: Ruff Check & Format
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Security Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc || true
          pip-audit -r requirements-optional.txt --desc || true

      - name: Pyright Type Check
        # User explicitly requested this to fail the build if type errors occur
        continue-on-error: false
        run: npx pyright

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run Pytest
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
        run: |
          set -e
          python -m pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=xml --cov-report=json

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Extract Coverage Percentage
        if: always() && github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.attrib.get("line-rate", "0"))
          percent = line_rate * 100
          with open("coverage_percent.txt", "w", encoding="utf-8") as f:
              f.write(f"{percent:.2f}")
          PY
          echo "COVERAGE_PERCENT=$(cat coverage_percent.txt)" >> "$GITHUB_ENV"

      - name: Comment Coverage On PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE_PERCENT: ${{ env.COVERAGE_PERCENT }}
        with:
          script: |
            const marker = '<!-- coverage-threshold-report -->';
            const threshold = 85;
            const coverage = Number(process.env.COVERAGE_PERCENT || '0');
            const passed = coverage >= threshold;
            const status = passed ? 'PASS' : 'FAIL';
            const body = `${marker}
            ### Coverage Report
            - Total Coverage: **${coverage.toFixed(2)}%**
            - Threshold: **${threshold}%**
            - Gate Status: **${status}**
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  ci-checks-windows:
    name: Code Quality & Tests (Windows)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v7
        with:
          username: postgres
          password: ${{ env.CI_PG_PASSWORD }}
          database: test_astock
          port: 5432

      - name: Setup Node for Pyright
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          set -o pipefail
          pip install -r requirements-optional.txt 2>&1 | tee optional-deps.log || echo "OPTIONAL_DEPS_FAILED=true" >> $GITHUB_ENV
          pip install -r requirements-dev.txt

      - name: Report optional deps status
        if: env.OPTIONAL_DEPS_FAILED == 'true'
        run: |
          echo "::warning::Optional dependencies failed to install. Some tests may be skipped."
          cat optional-deps.log

      - name: Install Node dependencies
        run: npm ci

      - name: Ruff Check & Format
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Pyright Type Check
        continue-on-error: false
        run: npx pyright

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run Pytest
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
        run: |
          python -m pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=json

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

  build-windows:
    name: Build Windows EXE (${{ matrix.variant }})
    needs: [ci-checks, ci-checks-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cpu
          - variant: cuda
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cu121
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install llama-cpp-python --extra-index-url ${{ matrix.llama_index_url }}
          pip install -r requirements.txt
          pip install -r requirements-optional.txt || echo "Optional deps failed, continuing..."
          pip install pyinstaller

      - name: Install UPX
        run: choco install upx -y

      - name: Build EXE with PyInstaller
        run: pyinstaller AStockScreener.spec

      - name: Compile Installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss
          options: /DMyAppVersion=${{ github.ref_name }} /DTargetVariant=${{ matrix.variant }}

      - name: Upload Build Artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: AStockScreener-Setup-${{ github.ref_name }}-windows-${{ matrix.variant }}
          path: Output/AStockScreener-Setup-${{ matrix.variant }}.exe
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/AStockScreener-Setup-${{ matrix.variant }}.exe
          generate_release_notes: true
