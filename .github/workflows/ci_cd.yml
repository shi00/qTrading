name: AStockScreener CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'requirements*.in'
      - 'pyproject.toml'
      - 'pyrightconfig.json'
      - 'alembic.ini'
      - 'alembic/**'
      - 'AStockScreener.spec'
      - 'installer.iss'
      - 'locales/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/ci_cd.yml'
  merge_group:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # 每天凌晨 2:00 UTC（北京时间 10:00）运行 flaky 检测
    - cron: '0 2 * * *'

permissions:
  contents: read

env:
  CI_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-fast:
    name: Fast Lint Check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.14']
        include:
          - python-version: '3.14'
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff==0.15.20

      - name: Ruff Lint Check
        run: ruff check .

      - name: Ruff Format Check
        run: ruff format --check .

  ci-checks:
    name: Code Quality & Tests (Linux, Python ${{ matrix.python-version }})
    needs: lint-fast
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          POSTGRES_DB: test_astock
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify CI_PG_PASSWORD secret
        env:
          CI_PG_PASSWORD: ${{ env.CI_PG_PASSWORD }}
        run: |
          if [ -z "$CI_PG_PASSWORD" ]; then
            echo "::error::CI_PG_PASSWORD secret is not configured. Please add it in repository settings (Settings > Secrets and variables > Actions)."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt
          uv pip install --system -r requirements-dev.txt
          pip install pyright==1.1.411

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Cache pytest
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('tests/**/*.py') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Cache ruff
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .ruff_cache
          key: ruff-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: ruff-${{ runner.os }}-

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Verify Version Consistency
        run: python scripts/verify_versions.py

      - name: Security Audit (pip-audit)
        run: |
          python scripts/run_pip_audit.py \
            --requirements requirements.txt requirements-optional.txt requirements-dev.txt \
            --allowlist .security/audit-allowlist.yml \
            --sources pypi osv

      - name: Pyright Type Check
        continue-on-error: false
        run: pyright

      - name: Scan weak assertions (incremental gate)
        run: python scripts/scan_weak_assertions.py --path tests/ --base tests/weak_assertion_baseline.json

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Verify ORM-Migration Schema Consistency
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
        run: python -m pytest tests/integration/test_orm_migration_consistency.py -v --tb=long

      - name: Run Unit Tests
        env:
          STRICT_SCHEMA_GATE: "1"
        run: |
          set -e
          python -m pytest tests/unit/ -v --tb=short --cov --cov-report=term-missing --cov-report=xml --cov-report=json --junitxml=junit-unit.xml

      - name: Run Integration Tests
        timeout-minutes: 10
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          set -e
          # Diagnose xdist worker hang: thread method dumps all thread stacks to stderr on timeout.
          # --max-worker-restart=0 prevents xdist from masking the deadlock by restarting workers.
          # --capture=no ensures faulthandler.dump_traceback() output reaches GitHub Actions logs.
          # step-level timeout-minutes=10 fails fast if thread method can't interrupt (e.g., C extension deadlock).
          python -m pytest tests/integration/ -n auto --max-worker-restart=0 \
            --timeout=120 --timeout-method=thread \
            -v --tb=long --capture=no \
            --cov --cov-report=term-missing --cov-append --junitxml=junit-integration.xml

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Check diff coverage
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          BASE="${BASE:-main}"
          git fetch --depth=1 origin "$BASE" 2>/dev/null || true
          python scripts/check_diff_coverage.py --base "origin/$BASE" --strict --threshold 80

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-${{ runner.os }}-${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
            junit-*.xml
          retention-days: 14

      - name: Generate SBOM
        if: always()
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-ci-checks.cdx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-ci-checks-${{ matrix.python-version }}
          path: sbom-ci-checks.cdx.json
          retention-days: 7

  e2e-tests-windows:
    name: E2E Tests (Windows)
    needs: lint-fast
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify CI_PG_PASSWORD secret
        env:
          CI_PG_PASSWORD: ${{ env.CI_PG_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$CI_PG_PASSWORD" ]; then
            echo "::error::CI_PG_PASSWORD secret is not configured. Please add it in repository settings (Settings > Secrets and variables > Actions)."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt
          uv pip install --system -r requirements-dev.txt
          pip install playwright pytest-playwright

      - name: Get Playwright Version
        shell: bash
        run: |
          PLAYWRIGHT_VERSION=$(python -c "from importlib.metadata import version; print(version('playwright'))")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cache/ms-playwright
            ~\AppData\Local\ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Start PostgreSQL Service (Windows)
        shell: pwsh
        run: |
          $service = Get-Service -Name "postgresql*" -ErrorAction SilentlyContinue
          if (-not $service) {
            $service = Get-Service -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "postgresql*" }
          }
          if ($service) {
            Set-Service -Name $service.Name -StartupType Automatic
            Start-Service $service.Name
            Write-Host "Successfully started PostgreSQL service: $($service.Name)"
          } else {
            Write-Error "PostgreSQL service not found on this Windows Runner."
            exit 1
          }

      - name: Initialize PostgreSQL Database and Password
        shell: pwsh
        run: |
          $pgBin = Get-ChildItem -Path "C:\Program Files\PostgreSQL" -Recurse -Filter "createdb.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
          if ($pgBin) {
            $env:Path += ";$pgBin"
            Write-Host "PostgreSQL bin path: $pgBin"
            
            for ($i=1; $i -le 15; $i++) {
              $ready = & pg_isready -h localhost -p 5432 -U postgres
              if ($ready -like "*accepting connections*") {
                Write-Host "PostgreSQL is accepting connections."
                break
              }
              Start-Sleep -Seconds 1
            }

            $newPwd = "${{ env.CI_PG_PASSWORD }}"
            $sql = "ALTER USER postgres WITH PASSWORD '$newPwd';"

            # S-1: 用临时文件传递 SQL，避免密码出现在进程命令行参数中 (R9)。
            # PowerShell 管道到原生命令存在 UTF-16 编码风险，临时文件显式 UTF-8 更可靠。
            $sqlFile = [System.IO.Path]::GetTempFileName()
            Set-Content -Path $sqlFile -Value $sql -Encoding utf8 -NoNewline

            $env:PGPASSWORD = "root"
            & psql -h localhost -p 5432 -U postgres -d postgres -f $sqlFile
            $exitCode1 = $LASTEXITCODE
            Remove-Item $sqlFile -ErrorAction SilentlyContinue

            if ($exitCode1 -ne 0) {
              Write-Host "Failed with password 'root', trying with empty password..."
              $env:PGPASSWORD = ""
              $sqlFile = [System.IO.Path]::GetTempFileName()
              Set-Content -Path $sqlFile -Value $sql -Encoding utf8 -NoNewline
              & psql -h localhost -p 5432 -U postgres -d postgres -f $sqlFile
              $exitCode2 = $LASTEXITCODE
              Remove-Item $sqlFile -ErrorAction SilentlyContinue
              if ($exitCode2 -ne 0) {
                Write-Error "Failed to update postgres user password."
                exit 1
              }
            }

            $env:PGPASSWORD = $newPwd
            & dropdb -h localhost -p 5432 -U postgres test_astock --if-exists
            & createdb -h localhost -p 5432 -U postgres test_astock
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to create test_astock database."
              exit 1
            }
            Write-Host "Successfully initialized database and password."
          } else {
            Write-Error "PostgreSQL binaries not found."
            exit 1
          }

      - name: Setup database
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: python -m alembic upgrade head

      - name: Run E2E Tests
        env:
          E2E_TEST_DB: 1
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
          E2E_ARTIFACT_DIR: "e2e-artifacts"
          E2E_TIMEOUT_MULTIPLIER: "2.0"
        run: |
          python -m pytest tests/e2e/ -v --tb=short --junitxml=junit-e2e.xml --reruns 2 --reruns-delay 5

      - name: Sanitize E2E artifacts
        if: always()
        shell: pwsh
        run: |
          # R9: 脱敏所有可能含 DB 连接串（含密码）的文本工件，覆盖 .log 和 junit XML
          $pattern = '([a-zA-Z0-9\+\.-]+)://([^:@\s]+):[^@\s]+@'
          $replacement = '$1://$2:***@'
          foreach ($filePath in @("logs/e2e-flet-app.log", "junit-e2e.xml")) {
            if (Test-Path $filePath) {
              (Get-Content $filePath) -replace $pattern, $replacement | Set-Content $filePath -Encoding UTF8
            }
          }

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-e2e-windows
          path: |
            junit-e2e.xml
            e2e-artifacts/
            logs/e2e-flet-app.log
          retention-days: 14

  ci-checks-windows:
    name: Code Quality & Unit Tests (Windows)
    needs: lint-fast
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        shell: bash
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt
          uv pip install --system -r requirements-dev.txt

      - name: Cache pytest
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('tests/**/*.py') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Run Unit Tests
        env:
          STRICT_SCHEMA_GATE: "1"
        run: python -m pytest tests/unit/ -v --tb=short --cov --cov-report=term-missing --cov-report=json --junitxml=junit-unit.xml

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-${{ runner.os }}
          path: |
            coverage.xml
            coverage.json
            junit-*.xml
          retention-days: 14

  requirements-drift:
    name: Detect requirements drift
    runs-on: windows-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      drift: ${{ steps.check-drift.outputs.drift }}
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Recompile requirements
        shell: bash
        run: |
          uv pip compile --universal --no-emit-index-url pyproject.toml -o requirements.txt
          uv pip compile --universal --no-emit-index-url --extra dev pyproject.toml -o requirements-dev.txt
          uv pip compile --universal --no-emit-index-url --extra optional pyproject.toml -o requirements-optional.txt

      - name: Check for drift
        id: check-drift
        shell: bash
        run: |
          if git diff --exit-code requirements.txt requirements-dev.txt requirements-optional.txt; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No requirements drift detected."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::warning::requirements*.txt drift detected. An update PR will be created."
          fi

  update-requirements:
    name: Update requirements*.txt
    needs: requirements-drift
    if: needs.requirements-drift.outputs.drift == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Recompile requirements
        shell: bash
        run: |
          uv pip compile --universal --no-emit-index-url pyproject.toml -o requirements.txt
          uv pip compile --universal --no-emit-index-url --extra dev pyproject.toml -o requirements-dev.txt
          uv pip compile --universal --no-emit-index-url --extra optional pyproject.toml -o requirements-optional.txt

      - name: Create PR for requirements update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.PAT_FOR_CI }}
          branch: chore/auto-requirements-sync
          title: "chore: sync requirements*.txt"
          body: |
            Auto-generated by CI after Windows `uv pip compile` drift detection.
            
            Please review changes and merge if appropriate.
            
            ## What changed
            - requirements.txt
            - requirements-dev.txt
            - requirements-optional.txt
          commit-message: "chore: update requirements*.txt via uv pip compile"
          delete-branch: true
          labels: dependencies, auto

  build-windows:
    name: Build Windows EXE (${{ matrix.variant }})
    needs: [ci-checks, ci-checks-windows, e2e-tests-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cpu
          - variant: cuda
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cu121
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv pip install --system llama-cpp-python --extra-index-url ${{ matrix.llama_index_url }}
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt
          pip install pyinstaller

      - name: Install UPX
        run: choco install upx -y

      - name: Build EXE with PyInstaller
        run: pyinstaller AStockScreener.spec

      - name: Smoke Test - Run EXE
        shell: pwsh
        run: |
          $exePath = "dist\AStockScreener\AStockScreener.exe"
          if (Test-Path $exePath) {
            Write-Host "Running smoke test on built EXE..."
            $proc = Start-Process -FilePath $exePath -ArgumentList "--help" -NoNewWindow -PassThru -RedirectStandardOutput "smoke-out.txt" -RedirectStandardError "smoke-err.txt"
            # 轮询等待进程退出或超时（最长 30 秒，每 500ms 检查）
            $timeout = 30
            $elapsed = 0
            while (-not $proc.HasExited -and $elapsed -lt $timeout) {
              Start-Sleep -Milliseconds 500
              $elapsed += 0.5
            }
            if (-not $proc.HasExited) {
              Write-Host "EXE started successfully (process still running after ${timeout}s timeout)"
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            } else {
              $exitCode = $proc.ExitCode
              if ($exitCode -ne 0) {
                Write-Error "EXE exited with non-zero code: $exitCode"
                if (Test-Path "smoke-err.txt") {
                  $errOutput = Get-Content "smoke-err.txt" -Raw
                  if ($errOutput.Length -gt 0) {
                    Write-Host "=== STDERR ==="
                    Write-Host $errOutput.Substring(0, [Math]::Min(2000, $errOutput.Length))
                  }
                }
                exit 1
              }
            }
            # 校验 --help 输出包含预期关键字
            if (Test-Path "smoke-out.txt") {
              $output = Get-Content "smoke-out.txt" -Raw
              if ($output -match "AStockScreener|usage") {
                Write-Host "Smoke test passed: --help output contains expected keyword"
              } else {
                Write-Error "Smoke test failed: --help output does not contain expected keyword (AStockScreener|usage)"
                exit 1
              }
              if ($output.Length -gt 0) {
                Write-Host "=== STDOUT Preview ==="
                Write-Host $output.Substring(0, [Math]::Min(500, $output.Length))
              }
            }
            Write-Host "Smoke test completed successfully."
          } else {
            Write-Error "EXE not found at $exePath"
            exit 1
          }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile Installer with Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DMyAppVersion=${{ github.ref_name }} /DTargetVariant=${{ matrix.variant }}

      - name: Smoke Test - Verify Installer Exists
        shell: pwsh
        run: |
          $installerPath = "Output\AStockScreener-Setup-${{ matrix.variant }}.exe"
          if (Test-Path $installerPath) {
            Write-Host "✅ Installer created successfully: $installerPath"
            $fileInfo = Get-Item $installerPath
            Write-Host "   Size: $([math]::Round($fileInfo.Length / 1MB, 2)) MB"
          } else {
            Write-Host "🔍 Diagnostics: Listing all .exe files in workspace to troubleshoot..."
            Get-ChildItem -Path . -Filter *.exe -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
            Write-Error "❌ Installer not found: $installerPath"
            exit 1
          }

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 Output\AStockScreener-Setup-${{ matrix.variant }}.exe | Format-List > SHA256SUMS-${{ matrix.variant }}.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-${{ matrix.variant }}.cdx.json

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: Output/AStockScreener-Setup-${{ matrix.variant }}.exe

      - name: Upload Build Artifact (non-tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: AStockScreener-Setup-${{ github.ref_name }}-windows-${{ matrix.variant }}
          path: Output/AStockScreener-Setup-${{ matrix.variant }}.exe
          retention-days: 7

      - name: Upload Release Assets (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-assets-${{ matrix.variant }}
          path: |
            Output/AStockScreener-Setup-${{ matrix.variant }}.exe
            SHA256SUMS-${{ matrix.variant }}.txt
            sbom-${{ matrix.variant }}.cdx.json
          retention-days: 3

  release-windows:
    name: Create GitHub Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download all release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: release-assets-*
          merge-multiple: false
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: |
            release-assets/release-assets-cpu/*
            release-assets/release-assets-cuda/*
          generate_release_notes: true

  flaky-detection:
    name: Flaky Test Detection (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt
          uv pip install --system -r requirements-dev.txt

      - name: Detect flaky tests (advisory)
        run: python scripts/detect_flaky.py
