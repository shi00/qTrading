name: AStockScreener CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'requirements*.in'
      - 'pyproject.toml'
      - 'pyrightconfig.json'
      - 'alembic.ini'
      - 'alembic/**'
      - 'AStockScreener.spec'
      - 'installer.iss'
      - 'locales/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/ci_cd.yml'
  merge_group:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD || 'ci_astock_default_pwd' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-fast:
    name: Fast Lint Check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.14']
        include:
          - python-version: '3.14'
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff Lint Check
        run: ruff check .

      - name: Ruff Format Check
        run: ruff format --check .

  ci-checks:
    name: Code Quality & Tests (Linux)
    needs: lint-fast
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          POSTGRES_DB: test_astock
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt 2>&1 | tee optional-deps.log || echo "OPTIONAL_DEPS_FAILED=true" >> $GITHUB_ENV
          uv pip install --system -r requirements-dev.txt
          pip install pyright==1.1.409

      - name: Report optional deps status
        if: env.OPTIONAL_DEPS_FAILED == 'true'
        run: |
          echo "::warning::Optional dependencies failed to install. Some tests may be skipped."
          cat optional-deps.log

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Cache pytest
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('tests/**/*.py') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Cache ruff
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ruff_cache
          key: ruff-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: ruff-${{ runner.os }}-

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Security Audit (pip-audit)
        run: |
          python scripts/run_pip_audit.py \
            --requirements requirements.txt requirements-optional.txt \
            --allowlist .security/audit-allowlist.yml \
            --sources pypi osv

      - name: Pyright Type Check
        continue-on-error: false
        run: pyright

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run Unit Tests
        run: |
          set -e
          python -m pytest tests/unit/ -v --tb=short -m "not slow" --cov --cov-report=term-missing --cov-report=xml --cov-report=json --junitxml=junit-unit.xml

      - name: Run Integration Tests
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
          SKIP_DATA_CONSISTENCY: 1
        run: |
          set -e
          python -m pytest tests/integration/ -n auto -v --tb=short --cov --cov-report=term-missing --cov-append --junitxml=junit-integration.xml

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-${{ runner.os }}
          path: |
            coverage.xml
            coverage.json
            junit-*.xml
          retention-days: 14

  e2e-tests-windows:
    name: E2E Tests (Windows)
    needs: lint-fast
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt || echo "Optional deps failed"
          uv pip install --system -r requirements-dev.txt
          pip install playwright pytest-playwright

      - name: Get Playwright Version
        shell: bash
        run: |
          PLAYWRIGHT_VERSION=$(python -c "from importlib.metadata import version; print(version('playwright'))")
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/ms-playwright
            ~\AppData\Local\ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Start PostgreSQL Service (Windows)
        shell: pwsh
        run: |
          $service = Get-Service | Where-Object { $_.Name -like "postgresql*" }
          if ($service) {
            Set-Service -Name $service.Name -StartupType Automatic
            Start-Service $service.Name
            Write-Host "Successfully started PostgreSQL service: $($service.Name)"
          } else {
            Write-Error "PostgreSQL service not found on this Windows Runner."
            exit 1
          }

      - name: Initialize PostgreSQL Database and Password
        shell: pwsh
        run: |
          $pgBin = Get-ChildItem -Path "C:\Program Files\PostgreSQL" -Recurse -Filter "createdb.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
          if ($pgBin) {
            $env:Path += ";$pgBin"
            Write-Host "PostgreSQL bin path: $pgBin"
            
            for ($i=1; $i -le 15; $i++) {
              $ready = & pg_isready -h localhost -p 5432 -U postgres
              if ($ready -like "*accepting connections*") {
                Write-Host "PostgreSQL is accepting connections."
                break
              }
              Start-Sleep -Seconds 1
            }

            $newPwd = "${{ env.CI_PG_PASSWORD }}"
            $sql = "ALTER USER postgres WITH PASSWORD '$newPwd';"
            
            $env:PGPASSWORD = "root"
            & psql -h localhost -p 5432 -U postgres -d postgres -c $sql
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Failed with password 'root', trying with empty password..."
              $env:PGPASSWORD = ""
              & psql -h localhost -p 5432 -U postgres -d postgres -c $sql
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Failed to update postgres user password."
                exit 1
              }
            }

            $env:PGPASSWORD = $newPwd
            & dropdb -h localhost -p 5432 -U postgres test_astock --if-exists
            & createdb -h localhost -p 5432 -U postgres test_astock
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to create test_astock database."
              exit 1
            }
            Write-Host "Successfully initialized database and password."
          } else {
            Write-Error "PostgreSQL binaries not found."
            exit 1
          }

      - name: Setup database
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: python -m alembic upgrade head

      - name: Start application server
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
          E2E_TEST_DB: 1
          FLET_SERVER_PORT: 8550
        shell: pwsh
        run: |
          Start-Process python -ArgumentList "main.py" -NoNewWindow
          Write-Host "Waiting for server to start..."
          for ($i=1; $i -le 30; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:8550" -UseBasicParsing -TimeoutSec 1
              if ($resp.StatusCode -eq 200) {
                Write-Host "Server is ready"
                break
              }
            } catch {
              # Ignore error
            }
            Start-Sleep -Seconds 1
          }

      - name: Run E2E Tests
        env:
          E2E_TEST_DB: 1
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
          E2E_BROWSER_CHANNEL: ""
          E2E_ARTIFACT_DIR: "e2e-artifacts"
        run: |
          python -m pytest tests/e2e/ -v --tb=short --junitxml=junit-e2e.xml

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-e2e-windows
          path: |
            junit-e2e.xml
            e2e-artifacts/
          retention-days: 14

  ci-checks-windows:
    name: Code Quality & Unit Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      pre_commit_outcome: ${{ steps.pre-commit.outcome }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install dependencies
        shell: bash
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt 2>&1 | tee optional-deps.log || echo "OPTIONAL_DEPS_FAILED=true" >> $GITHUB_ENV
          uv pip install --system -r requirements-dev.txt
          pip install pyright==1.1.409

      - name: Report optional deps status
        if: env.OPTIONAL_DEPS_FAILED == 'true'
        run: |
          echo "::warning::Optional dependencies failed to install. Some tests may be skipped."
          cat optional-deps.log

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Cache pytest
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('tests/**/*.py') }}
          restore-keys: pytest-${{ runner.os }}-

      - name: Cache ruff
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ruff_cache
          key: ruff-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: ruff-${{ runner.os }}-

      - name: Run pre-commit hooks
        id: pre-commit
        continue-on-error: true
        run: pre-commit run --all-files

      - name: Check if pre-commit failed
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::warning::pre-commit hooks failed. requirements*.txt may need updating."
          echo "PRE_COMMIT_FAILED=true" >> $GITHUB_ENV

      - name: Fail if pre-commit failed (non-main branch)
        if: steps.pre-commit.outcome == 'failure' && github.ref != 'refs/heads/main'
        run: exit 1

      - name: Pyright Type Check
        continue-on-error: false
        run: pyright

      - name: Run Unit Tests
        run: python -m pytest tests/unit/ -v --tb=short -m "not slow" --cov --cov-report=term-missing --cov-report=json --junitxml=junit-unit.xml

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-${{ runner.os }}
          path: |
            coverage.xml
            coverage.json
            junit-*.xml
          retention-days: 14

  update-requirements:
    name: Update requirements*.txt
    needs: ci-checks-windows
    if: always() && needs.ci-checks-windows.outputs.pre_commit_outcome == 'failure' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Recompile requirements
        shell: bash
        run: |
          uv pip compile --universal --no-emit-index-url pyproject.toml -o requirements.txt
          uv pip compile --universal --no-emit-index-url --extra dev pyproject.toml -o requirements-dev.txt
          uv pip compile --universal --no-emit-index-url --extra optional pyproject.toml -o requirements-optional.txt

      - name: Create PR for requirements update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.PAT_FOR_CI }}
          branch: chore/auto-requirements-sync
          title: "chore: sync requirements*.txt"
          body: |
            Auto-generated by CI after Windows `uv pip compile` drift detection.
            
            Please review changes and merge if appropriate.
            
            ## What changed
            - requirements.txt
            - requirements-dev.txt
            - requirements-optional.txt
          commit-message: "chore: update requirements*.txt via uv pip compile"
          delete-branch: true
          labels: dependencies, auto

  build-windows:
    name: Build Windows EXE (${{ matrix.variant }})
    needs: [ci-checks, ci-checks-windows, e2e-tests-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cpu
          - variant: cuda
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cu121
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install dependencies
        run: |
          uv pip install --system llama-cpp-python --extra-index-url ${{ matrix.llama_index_url }}
          uv pip install --system -r requirements.txt
          uv pip install --system -r requirements-optional.txt || echo "Optional deps failed, continuing..."
          pip install pyinstaller

      - name: Install UPX
        run: choco install upx -y

      - name: Build EXE with PyInstaller
        run: pyinstaller AStockScreener.spec

      - name: Smoke Test - Run EXE
        shell: pwsh
        run: |
          $exePath = "dist\AStockScreener\AStockScreener.exe"
          if (Test-Path $exePath) {
            Write-Host "Running smoke test on built EXE..."
            $proc = Start-Process -FilePath $exePath -ArgumentList "--help" -NoNewWindow -PassThru -RedirectStandardOutput "smoke-out.txt" -RedirectStandardError "smoke-err.txt"
            Start-Sleep -Seconds 5
            if (-not $proc.HasExited) {
              Write-Host "EXE started successfully (process running)"
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            } else {
              $exitCode = $proc.ExitCode
              if ($exitCode -ne 0) {
                Write-Error "EXE exited with non-zero code: $exitCode"
                if (Test-Path "smoke-err.txt") {
                  $errOutput = Get-Content "smoke-err.txt" -Raw
                  if ($errOutput.Length -gt 0) {
                    Write-Host "=== STDERR ==="
                    Write-Host $errOutput.Substring(0, [Math]::Min(2000, $errOutput.Length))
                  }
                }
                exit 1
              }
            }
            if (Test-Path "smoke-out.txt") {
              $output = Get-Content "smoke-out.txt" -Raw
              if ($output.Length -gt 0) {
                Write-Host "=== STDOUT Preview ==="
                Write-Host $output.Substring(0, [Math]::Min(500, $output.Length))
              }
            }
            Write-Host "Smoke test completed successfully."
          } else {
            Write-Error "EXE not found at $exePath"
            exit 1
          }
        continue-on-error: ${{ matrix.variant == 'cpu' }}

      - name: Compile Installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@202dd0c4950ef315b6ba13359998fe120179b147  # v1.2.8
        with:
          path: installer.iss
          options: /DMyAppVersion=${{ github.ref_name }} /DTargetVariant=${{ matrix.variant }}

      - name: Smoke Test - Verify Installer Exists
        shell: pwsh
        run: |
          $installerPath = "Output\AStockScreener-Setup-${{ matrix.variant }}.exe"
          if (Test-Path $installerPath) {
            Write-Host "✅ Installer created successfully: $installerPath"
            $fileInfo = Get-Item $installerPath
            Write-Host "   Size: $([math]::Round($fileInfo.Length / 1MB, 2)) MB"
          } else {
            Write-Error "❌ Installer not found: $installerPath"
            exit 1
          }

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 Output\AStockScreener-Setup-${{ matrix.variant }}.exe | Format-List > SHA256SUMS-${{ matrix.variant }}.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-${{ matrix.variant }}.cdx.json

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@619dbb2e39e1a4c781e6fa27a689fc2f5a6f3a7e  # v2.4.2
        with:
          subject-path: Output/AStockScreener-Setup-${{ matrix.variant }}.exe

      - name: Upload Build Artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: AStockScreener-Setup-${{ github.ref_name }}-windows-${{ matrix.variant }}
          path: Output/AStockScreener-Setup-${{ matrix.variant }}.exe
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            Output/AStockScreener-Setup-${{ matrix.variant }}.exe
            SHA256SUMS-${{ matrix.variant }}.txt
            sbom-${{ matrix.variant }}.cdx.json
          generate_release_notes: true
