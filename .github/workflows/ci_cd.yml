name: AStockScreener CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - 'requirements*.in'
      - 'pyproject.toml'
      - 'pyrightconfig.json'
      - 'alembic.ini'
      - 'alembic/**'
      - 'AStockScreener.spec'
      - 'installer.iss'
      - 'locales/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/ci_cd.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD || 'ci_astock_default_pwd' }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci-checks:
    name: Code Quality & Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          POSTGRES_DB: test_astock
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Setup Node for Pyright
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          set -o pipefail
          pip install --prefer-binary -r requirements-optional.txt 2>&1 | tee optional-deps.log || echo "OPTIONAL_DEPS_FAILED=true" >> $GITHUB_ENV
          pip install --prefer-binary -r requirements-dev.txt

      - name: Report optional deps status
        if: env.OPTIONAL_DEPS_FAILED == 'true'
        run: |
          echo "::warning::Optional dependencies failed to install. Some tests may be skipped."
          cat optional-deps.log

      - name: Install Node dependencies
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Security Audit (pip-audit)
        run: |
          python scripts/run_pip_audit.py \
            --requirements requirements.txt requirements-optional.txt \
            --allowlist .security/audit-allowlist.yml \
            --sources pypi osv

      - name: Pyright Type Check
        continue-on-error: false
        run: npx pyright

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run Unit Tests
        run: |
          set -e
          python -m pytest tests/unit/ -v --tb=short -m "not slow" --cov --cov-report=term-missing --cov-report=xml --cov-report=json --junitxml=junit-unit.xml

      - name: Run Integration Tests
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
          SKIP_DATA_CONSISTENCY: 1
        run: |
          set -e
          python -m pytest tests/integration/ tests/e2e/ -v --tb=short --cov --cov-report=term-missing --cov-append --junitxml=junit-integration.xml

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Extract Coverage Percentage
        if: always() && github.event_name == 'pull_request'
        run: |
          python - <<'PY'
          import tomllib
          import xml.etree.ElementTree as ET
          from pathlib import Path
          
          try:
              root = ET.parse("coverage.xml").getroot()
              line_rate = float(root.attrib.get("line-rate", "0"))
              percent = line_rate * 100
          except Exception:
              percent = 0.0
          
          with open("coverage_percent.txt", "w", encoding="utf-8") as f:
              f.write(f"{percent:.2f}")
          
          try:
              pyproject = Path("pyproject.toml")
              with open(pyproject, "rb") as f:
                  cfg = tomllib.load(f)
              report = cfg.get("tool", {}).get("coverage", {}).get("report", {})
              fail_under = report.get("fail_under", 85)
              per_file_minimum = report.get("per_file_minimum", 80)
          except Exception:
              fail_under = 85
              per_file_minimum = 80
          
          with open("coverage_thresholds.txt", "w", encoding="utf-8") as f:
              f.write(f"{fail_under}\n{per_file_minimum}")
          PY
          echo "COVERAGE_PERCENT=$(cat coverage_percent.txt)" >> "$GITHUB_ENV"
          {
            echo 'COVERAGE_THRESHOLDS<<EOF'
            cat coverage_thresholds.txt
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Comment Coverage On PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        env:
          COVERAGE_PERCENT: ${{ env.COVERAGE_PERCENT }}
          COVERAGE_THRESHOLDS: ${{ env.COVERAGE_THRESHOLDS }}
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const coverage = Number(process.env.COVERAGE_PERCENT || '0');
            const thresholds = (process.env.COVERAGE_THRESHOLDS || '85\n80').split('\n');
            const hardGate = Number(thresholds[0] || 85);
            const perFileGate = Number(thresholds[1] || 80);
            const passed = coverage >= hardGate;
            
            let statusIcon = passed ? '✅' : '⚠️';
            let statusText = passed ? 'PASS' : 'BELOW TARGET';
            
            const body = `${marker}
            ### Coverage Report
            - **Total Coverage**: ${coverage.toFixed(2)}%
            - **Hard Gate**: ${hardGate}% (must pass)
            - **Per-File Gate**: ${perFileGate}% (each file must pass)
            - **Status**: ${statusIcon} ${statusText}
            
            | Gate | Threshold | Status |
            |------|-----------|--------|
            | Overall | ${hardGate}% | ${coverage >= hardGate ? '✅ PASS' : '❌ FAIL'} |
            | Per-File | ${perFileGate}% | See check_per_file_coverage step |
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-reports-${{ runner.os }}
          path: |
            coverage.xml
            coverage.json
            junit-*.xml
          retention-days: 14

  ci-checks-windows:
    name: Code Quality & Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      pre_commit_outcome: ${{ steps.pre-commit.outcome }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@c4dda34aae1c821e3a771b68b73b13af3198a7ee  # v8
        with:
          username: postgres
          password: ${{ env.CI_PG_PASSWORD }}
          database: test_astock
          port: 5432

      - name: Setup Node for Pyright
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          set -o pipefail
          pip install --prefer-binary -r requirements-optional.txt 2>&1 | tee optional-deps.log || echo "OPTIONAL_DEPS_FAILED=true" >> $GITHUB_ENV
          pip install --prefer-binary -r requirements-dev.txt

      - name: Report optional deps status
        if: env.OPTIONAL_DEPS_FAILED == 'true'
        run: |
          echo "::warning::Optional dependencies failed to install. Some tests may be skipped."
          cat optional-deps.log

      - name: Install Node dependencies
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        id: pre-commit
        continue-on-error: true
        run: pre-commit run --all-files

      - name: Check if pre-commit failed
        if: steps.pre-commit.outcome == 'failure'
        run: |
          echo "::warning::pre-commit hooks failed. requirements*.txt may need updating."
          echo "PRE_COMMIT_FAILED=true" >> $GITHUB_ENV

      - name: Fail if pre-commit failed (non-main branch)
        if: steps.pre-commit.outcome == 'failure' && github.ref != 'refs/heads/main'
        run: exit 1

      - name: Pyright Type Check
        continue-on-error: false
        run: npx pyright

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base
          python -m alembic upgrade head

      - name: Run Unit Tests
        run: python -m pytest tests/unit/ -v --tb=short -m "not slow" --cov --cov-report=term-missing --cov-report=json --junitxml=junit-unit.xml

      - name: Run Integration Tests
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: ${{ env.CI_PG_PASSWORD }}
          DATABASE_URL: postgresql+asyncpg://postgres:${{ env.CI_PG_PASSWORD }}@localhost:5432/test_astock
          SKIP_DATA_CONSISTENCY: 1
        run: python -m pytest tests/integration/ tests/e2e/ -v --tb=short --cov --cov-report=term-missing --cov-append --junitxml=junit-integration.xml

      - name: Check Per-File Coverage >= 80%
        run: python scripts/check_per_file_coverage.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-reports-${{ runner.os }}
          path: |
            coverage.xml
            coverage.json
            junit-*.xml
          retention-days: 14

  update-requirements:
    name: Update requirements*.txt
    needs: ci-checks-windows
    if: always() && needs.ci-checks-windows.outputs.pre_commit_outcome == 'failure' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Recompile requirements
        shell: bash
        run: |
          uv pip compile --universal --no-emit-index-url pyproject.toml -o requirements.txt
          uv pip compile --universal --no-emit-index-url --extra dev pyproject.toml -o requirements-dev.txt
          uv pip compile --universal --no-emit-index-url --extra optional pyproject.toml -o requirements-optional.txt

      - name: Create PR for requirements update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.PAT_FOR_CI }}
          branch: chore/auto-requirements-sync
          title: "chore: sync requirements*.txt"
          body: |
            Auto-generated by CI after Windows `uv pip compile` drift detection.
            
            Please review changes and merge if appropriate.
            
            ## What changed
            - requirements.txt
            - requirements-dev.txt
            - requirements-optional.txt
          commit-message: "chore: update requirements*.txt via uv pip compile"
          delete-branch: true
          labels: dependencies, auto

  build-windows:
    name: Build Windows EXE (${{ matrix.variant }})
    needs: [ci-checks, ci-checks-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cpu
          - variant: cuda
            llama_index_url: https://abetlen.github.io/llama-cpp-python/whl/cu121
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-optional.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary llama-cpp-python --extra-index-url ${{ matrix.llama_index_url }}
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary -r requirements-optional.txt || echo "Optional deps failed, continuing..."
          pip install pyinstaller

      - name: Install UPX
        run: choco install upx -y

      - name: Build EXE with PyInstaller
        run: pyinstaller AStockScreener.spec

      - name: Compile Installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@b8e8eb5936437c243592fda645c96dfc6488c275  # v1.2.2
        with:
          path: installer.iss
          options: /DMyAppVersion=${{ github.ref_name }} /DTargetVariant=${{ matrix.variant }}

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 Output\AStockScreener-Setup-${{ matrix.variant }}.exe | Format-List > SHA256SUMS-${{ matrix.variant }}.txt

      - name: Upload Build Artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: AStockScreener-Setup-${{ github.ref_name }}-windows-${{ matrix.variant }}
          path: Output/AStockScreener-Setup-${{ matrix.variant }}.exe
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            Output/AStockScreener-Setup-${{ matrix.variant }}.exe
            SHA256SUMS-${{ matrix.variant }}.txt
          generate_release_notes: true
