name: Renovate Dependency Update

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR created)'
        required: false
        default: false
        type: boolean
      log_level:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - trace

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate Bot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Validate RENOVATE_TOKEN
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if [ -z "$RENOVATE_TOKEN" ]; then
            echo "::error::RENOVATE_TOKEN secret is empty or not configured. Add it at Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          http_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "Authorization: Bearer $RENOVATE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)
          if [ "$http_code" = "000" ]; then
            echo "::error::Failed to reach api.github.com (network error or timeout). Check runner network connectivity."
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::error::RENOVATE_TOKEN authentication failed (HTTP $http_code). Regenerate a PAT with 'repo' scope at https://github.com/settings/tokens and update the secret."
            exit 1
          fi
          echo "RENOVATE_TOKEN is valid."

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@dd5302ec17783b2fc721b19ae7209b57b1587765  # v46.1.17
        with:
          configurationFile: .github/renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run == true }}
