title = "Gitleaks configuration for AStockScreener"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for AStockScreener"
paths = [
  '''tests/fixtures/.*''',
  '''tests/.*/fixtures/.*''',
  '''tests/unit/.*test.*\.py''',
  '''tests/integration/.*test.*\.py''',
  '''tests/e2e/.*test.*\.py''',
  '''config/example.*\.yaml$''',
  '''config/example.*\.yml$''',
  '''config/example.*\.json$''',
  '''.*\.example$''',
  '''docs/.*\.md$''',
  '''README\.md$''',
  '''CLAUDE\.md$'''
]
regexes = [
  '''test_token_[a-zA-Z0-9_]+''',
  '''fake_api_key_[a-zA-Z0-9]+''',
  '''mock_secret_[a-zA-Z0-9]+''',
  '''sk-abc123xyz789''',
  '''sk-proj-LEAKED123''',
  '''sk-LEAKED_KEY_12345''',
  '''sk-proj-abc123def456ghi789''',
  '''sk-proj-LEAKED-KEY-12345''',
  '''sk-LEAKED123''',
  '''eyJhbGciOiJIUzI1NiJ9''',
  '''YOUR_API_KEY_HERE''',
  '''YOUR_TOKEN_HERE''',
  '''<YOUR_API_KEY>''',
  '''\$\{.*\}''',
  '''\{\{.*\}\}'''
]
