repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: python -m ruff check --fix
        language: python
        additional_dependencies: ["ruff>=0.15.20"]
        types_or: [ python, pyi ]
        require_serial: true

      - id: ruff-format
        name: Ruff Format
        entry: python -m ruff format
        language: python
        additional_dependencies: ["ruff>=0.15.20"]
        types_or: [ python, pyi ]
        require_serial: true

      - id: type-ignore-reason
        name: Check type:ignore has reason
        entry: >-
          python -c "import sys,re;[sys.exit(1) for f in sys.argv[1:] for line in open(f,encoding='utf-8').readlines() if re.search(r'# type: ?ignore(\s+#|$)', line.rstrip())]"
        language: system
        types_or: [ python, pyi ]

      - id: no-isolated-asyncio-testcase
        name: Check no IsolatedAsyncioTestCase usage
        entry: python scripts/check_no_isolated_asyncio.py
        language: system
        types_or: [ python, pyi ]
        pass_filenames: true
        exclude: ^scripts/check_no_isolated_asyncio\.py$

      - id: pyright-changed
        name: Pyright Type Check (staged files)
        entry: python scripts/run_pyright_changed.py
        language: system
        types_or: [ python, pyi ]
        pass_filenames: true
        # 排除 alembic 迁移脚本（自动生成，类型注解宽松）与 scripts 自身（工具脚本，非业务代码）
        exclude: ^(alembic/|scripts/run_pyright_changed\.py$)

      - id: weak-assertion-changed
        name: Weak Assertion Scan (staged test files)
        entry: python scripts/check_staged_weak_assertions.py
        language: system
        types_or: [ python, pyi ]
        pass_filenames: true
        # 仅扫描 tests/ 下的 test_*.py（脚本内部已按文件名前缀过滤，files 是 pre-commit 层前置过滤）
        files: ^tests/.*test_.*\.py$

      - id: pip-compile-core
        name: pip-compile requirements.txt
        entry: uv pip compile --universal --no-emit-index-url pyproject.toml -o requirements.txt
        language: system
        files: ^(pyproject\.toml|requirements\.in)$
        pass_filenames: false

      - id: pip-compile-dev
        name: pip-compile requirements-dev.txt
        entry: uv pip compile --universal --no-emit-index-url --extra dev pyproject.toml -o requirements-dev.txt
        language: system
        files: ^(pyproject\.toml|requirements-dev\.in)$
        pass_filenames: false

      - id: pip-compile-optional
        name: pip-compile requirements-optional.txt
        entry: uv pip compile --universal --no-emit-index-url --extra optional pyproject.toml -o requirements-optional.txt
        language: system
        files: ^(pyproject\.toml|requirements-optional\.in)$
        pass_filenames: false

      - id: verify-versions
        name: Verify and Fix Versions
        entry: python scripts/verify_versions.py --fix
        language: python
        files: ^(pyproject\.toml|installer\.iss|\.release-please-manifest\.json|README\.md|CONTRIBUTING\.md|SECURITY\.md|CLAUDE\.md)$
        pass_filenames: false

      - id: docs-consistency
        name: Check docs consistency
        entry: python scripts/check_docs_consistency.py
        language: python
        additional_dependencies: ["pyyaml>=6.0"]
        # NOTE(lazy): files 含 .py 以触发 NOTE(lazy) 三要素检查(任何 .py 变化都跑).
        #   ceiling: 仅 .md/.toml/.yaml 变化时漏触发 NOTE(lazy) 守护.
        #   upgrade: 拆分 NOTE(lazy) 守护为独立 hook 时收窄 files 范围.
        files: \.(md|toml|yaml|py)$
        pass_filenames: false

      - id: redline-check
        name: Redline automation check (R4/R12/R13/R14/R15 + UI bare colors)
        entry: python scripts/check_redlines.py
        language: system
        files: ^(core|data|services|strategies|utils|app|ui)/.*\.py$|^scripts/check_redlines\.py$|^\.pre-commit-config\.yaml$
        pass_filenames: false

      - id: theme-contrast-check
        name: WCAG theme contrast check
        entry: python scripts/check_theme_contrast.py
        language: system
        files: ^ui/theme\.py$|^scripts/check_theme_contrast\.py$
        pass_filenames: false

      - id: lint-imports
        name: Import Linter (R1 architecture guard)
        entry: lint-imports
        language: system
        pass_filenames: false
        files: ^(core|data|services|strategies|ui|app|utils)/|pyproject\.toml$
