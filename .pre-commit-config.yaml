repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: python -m ruff check --fix
        language: system
        types_or: [ python, pyi ]
        require_serial: true

      - id: ruff-format
        name: Ruff Format
        entry: python -m ruff format
        language: system
        types_or: [ python, pyi ]
        require_serial: true

      - id: type-ignore-reason
        name: Check type:ignore has reason
        entry: >-
          python -c "import sys,re;[sys.exit(1) for f in sys.argv[1:] for line in open(f,encoding='utf-8').readlines() if re.search(r'# type: ?ignore(\s+#|$)', line.rstrip())]"
        language: system
        types_or: [ python, pyi ]

      - id: no-isolated-asyncio-testcase
        name: Check no IsolatedAsyncioTestCase usage
        entry: python scripts/check_no_isolated_asyncio.py
        language: system
        types_or: [ python, pyi ]
        pass_filenames: true
        exclude: ^scripts/check_no_isolated_asyncio\.py$

      - id: pip-compile-core
        name: pip-compile requirements.txt
        entry: uv pip compile --universal --no-emit-index-url pyproject.toml -o requirements.txt
        language: system
        files: ^(pyproject\.toml|requirements\.in)$
        pass_filenames: false

      - id: pip-compile-dev
        name: pip-compile requirements-dev.txt
        entry: uv pip compile --universal --no-emit-index-url --extra dev pyproject.toml -o requirements-dev.txt
        language: system
        files: ^(pyproject\.toml|requirements-dev\.in)$
        pass_filenames: false

      - id: pip-compile-optional
        name: pip-compile requirements-optional.txt
        entry: uv pip compile --universal --no-emit-index-url --extra optional pyproject.toml -o requirements-optional.txt
        language: system
        files: ^(pyproject\.toml|requirements-optional\.in)$
        pass_filenames: false

      - id: verify-versions
        name: Verify and Fix Versions
        entry: python scripts/verify_versions.py --fix
        language: system
        files: ^(pyproject\.toml|installer\.iss|\.release-please-manifest\.json|README\.md|CONTRIBUTING\.md|SECURITY\.md|CLAUDE\.md)$
        pass_filenames: false

      - id: docs-consistency
        name: Check docs consistency
        entry: python scripts/check_docs_consistency.py
        language: system
        files: ^(CLAUDE\.md|CONTRIBUTING\.md|pyproject\.toml|\.pre-commit-config\.yaml|scripts/check_docs_consistency\.py)$
        pass_filenames: false
