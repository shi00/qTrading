repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: python -m ruff check --fix
        language: system
        types_or: [ python, pyi ]
        require_serial: true

      - id: ruff-format
        name: Ruff Format
        entry: python -m ruff format
        language: system
        types_or: [ python, pyi ]
        require_serial: true

      - id: type-ignore-reason
        name: Check type:ignore has reason
        entry: >-
          python -c "import sys,re;[sys.exit(1) for f in sys.argv[1:] for line in open(f,encoding='utf-8').readlines() if re.search(r'# type: ignore$', line.rstrip())]"
        language: system
        types_or: [ python, pyi ]
